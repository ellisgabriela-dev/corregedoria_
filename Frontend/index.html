<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Corregedoria</title>

<link rel="icon" href="icon.png">
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginBox">

<img src="funase.png" width="150" style="display:block;margin:0 auto 20px;">
<input type="text" id="usuario" placeholder="Usuário">
<input type="password" id="senha" placeholder="Senha">
<button onclick="entrar()">Entrar</button>

</div>

<!-- APP -->
<div class="app" id="app">

<button class="logout" onclick="sair()">Sair</button>

<h1>Agenda Corregedoria</h1>
<img src="funase.png" width="200" style="display:block;margin:0 auto 20px;">

<div class="dashboard">
  <div class="card alerta-vencido">
    <span id="lateCount">0</span>
    <p>Prazos vencidos</p>
  </div>

  <div class="card alerta-proximo">
    <span id="soonCount">0</span>
    <p>Prazos próximos</p>
  </div>

  <div class="card alerta-ok">
    <span id="doneCount">0</span>
    <p>Concluídas</p>
  </div>
</div>

<!-- GRÁFICOS -->
<div class="graficos">
  <canvas id="graficoPrioridade"></canvas>
  <canvas id="graficoCategoria"></canvas>
</div>

<!-- INPUT AREA -->
<div class="input-area">

  <input type="text" id="taskInput" placeholder="Nova tarefa">
  <input type="date" id="date">

  <select id="category">
    <option value="Demandas">📂 Demandas</option>
    <option value="Reuniões">⚖ Reuniões</option>
    <option value="Revisão">👨‍⚖ Revisão</option>
    <option value="Processos">👨‍⚖ Processos</option>
  </select>

  <select id="priority">
    <option value="urgente">🔴 Urgente</option>
    <option value="medio">🟡 Médio</option>
    <option value="nao">🟢 Não urgente</option>
  </select>

  <!-- FILTRO -->
  <select id="filtroCategoria" onchange="filtrar()">
    <option value="">Todas</option>
    <option value="Demandas">Demandas</option>
    <option value="Reuniões">Reuniões</option>
    <option value="Revisão">Revisão</option>
    <option value="Processos">Processos</option>
  </select>

  <button onclick="addTask()">+</button>
  <button class="limpar" onclick="limparHistorico()">🗑</button>

</div>

<!-- LISTA DE TAREFAS -->
<ul id="taskList"></ul>

<!-- CALENDÁRIO -->
<div id="calendar"></div>

</div>
  
  <div> id="loading" class="loading hidden">
  <div class="spinner"></div>
  <p>Carregando...</p>
  </div>

<footer>
2026 | PrismCode <img src="prism.png" width="70">
</footer>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
