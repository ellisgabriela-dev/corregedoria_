<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="icon" sizes="32x32" href="imagens/icon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Corregedoria</title>

<link rel="icon" href="icon.png">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginBox">

<img src="imagens/funase.png" width="150" style="display:block;margin:0 auto 20px;">

<input type="text" id="usuario" placeholder="Usuário">
<input type="password" id="senha" placeholder="Senha">

<button type="button" onclick="entrar()">Entrar</button>

<!-- 🔥 CADASTRO (NOVO - ADICIONADO) -->
<button type="button" onclick="cadastrar()">Cadastrar</button>

<hr style="margin:15px 0;">

</div>

<!-- APP -->
<div class="app" id="app" style="display:none;">

<button onclick="sair()">Sair</button>

<h1>Agenda Corregedoria</h1>

<img src="imagens/funase.png" width="200" style="display:block;margin:0 auto 20px;">

<div class="dashboard">
  <div class="status-item">
    <span id="vencidos">0</span>
    Vencidos
  </div>

  <div class="status-item">
    <span id="proximos">0</span>
    Próximos
  </div>

  <div class="status-item">
    <span id="concluidos">0</span>
    Concluídos
  </div>
</div>

<div class="input-area">

  <input type="text" id="taskInput" placeholder="Nova tarefa">
  <input type="date" id="date">

  <select id="category">
    <option value="Demandas">Demandas</option>
    <option value="Reuniões">Reuniões</option>
    <option value="Revisão">Revisão</option>
    <option value="Processos">Processos</option>
  </select>

  <select id="priority">
    <option value="urgente">Urgente</option>
    <option value="medio">Médio</option>
    <option value="nao">Normal</option>
  </select>

  <button onclick="addTask()">Adicionar</button>
  <button class="delete-btn">🗑</button>

</div>

<ul id="taskList"></ul>

<canvas id="graficoPrioridade"></canvas>
<canvas id="graficoCategoria"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>
  
<footer class="footer-simple">
  <p>© 2026 | PrismCode. Todos os direitos reservados.</p>
</footer>
</body>
</html>
