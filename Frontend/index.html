<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="icon" sizes="32x32" href="imagens/icon.png">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Corregedoria</title>
<style>
  :root {
    --bg: #0b0f1a;
    --surface: #131929;
    --card: #1a2236;
    --border: #243050;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --text: #e8edf8;
    --muted: #6b7fa3;
    --urgente: #f43f5e;
    --medio: #f59e0b;
    --nao-urgente: #22c55e;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  /* AUTH */
  #auth-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 30% 40%, #1a2a4a 0%, var(--bg) 60%);
  }
  .auth-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    padding: 48px 40px; width: 400px; max-width: 95vw;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
    animation: fadeUp 0.5s ease;
  }
  .auth-logo { font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--accent); margin-bottom: 8px; }
  .auth-sub { color: var(--muted); margin-bottom: 32px; font-size: 14px; }
  .auth-tabs { display: flex; gap: 4px; margin-bottom: 28px; background: var(--bg); border-radius: 10px; padding: 4px; }
  .auth-tab { flex: 1; padding: 8px; text-align: center; cursor: pointer; border-radius: 8px; font-size: 14px; font-weight: 500; color: var(--muted); transition: all 0.2s; }
  .auth-tab.active { background: var(--accent); color: #fff; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
  .form-group input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 12px 14px; border-radius: 10px; font-size: 14px; font-family: inherit; transition: border 0.2s; outline: none; }
  .form-group input:focus { border-color: var(--accent); }
  .btn-primary { width: 100%; padding: 13px; background: var(--accent); border: none; border-radius: 10px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity 0.2s, transform 0.1s; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:active { transform: scale(0.98); }
  .error-msg { color: var(--urgente); font-size: 13px; margin-top: 10px; text-align: center; }

  /* APP */
  #app-screen { display: none; flex-direction: column; min-height: 100vh; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .topbar-logo { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--accent); cursor: pointer; }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .user-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #fff; cursor: pointer; }
  .btn-sm { padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text); font-size: 13px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
  .btn-sm:hover { background: var(--border); }
  .btn-sm.primary { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* HOME */
  #home-view { padding: 40px 32px; animation: fadeUp 0.4s ease; }
  .home-header { margin-bottom: 32px; }
  .home-header h1 { font-family: 'DM Serif Display', serif; font-size: 36px; margin-bottom: 8px; }
  .home-header p { color: var(--muted); font-size: 15px; }
  .boards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
  .board-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 22px; cursor: pointer; transition: transform 0.2s, border-color 0.2s;
    position: relative; overflow: hidden;
  }
  .board-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; }
  .board-card:hover { transform: translateY(-3px); border-color: var(--accent); }
  .board-card h3 { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
  .board-card p { color: var(--muted); font-size: 13px; margin-bottom: 14px; }
  .board-meta { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 12px; }
  .new-board-card {
    background: transparent; border: 2px dashed var(--border); border-radius: var(--radius);
    padding: 22px; cursor: pointer; transition: border-color 0.2s, background 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 10px; color: var(--muted); font-size: 15px;
    min-height: 120px;
  }
  .new-board-card:hover { border-color: var(--accent); color: var(--accent); background: rgba(79,142,247,0.05); }

  /* BOARD VIEW */
  #board-view { display: none; flex-direction: column; height: calc(100vh - 60px); }
  .board-header { padding: 20px 24px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
  .board-title { font-family: 'DM Serif Display', serif; font-size: 24px; }
  .board-header .spacer { flex: 1; }
  .kanban-area { flex: 1; overflow-x: auto; padding: 24px; display: flex; gap: 18px; align-items: flex-start; }

  /* COLUMNS */
  .column { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); width: 300px; min-width: 300px; display: flex; flex-direction: column; max-height: calc(100vh - 180px); }
  .col-header { padding: 14px 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); }
  .col-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .col-title { font-weight: 600; font-size: 14px; flex: 1; }
  .col-count { background: var(--border); color: var(--muted); font-size: 11px; padding: 2px 8px; border-radius: 20px; }
  .col-tasks { padding: 10px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
  .col-tasks::-webkit-scrollbar { width: 4px; }
  .col-tasks::-webkit-scrollbar-track { background: transparent; }
  .col-tasks::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .col-footer { padding: 10px; border-top: 1px solid var(--border); }
  .add-task-btn { width: 100%; padding: 8px; border: 1px dashed var(--border); border-radius: 8px; background: transparent; color: var(--muted); font-size: 13px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
  .add-task-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* TASK CARD */
  .task-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; cursor: pointer; transition: border-color 0.2s, transform 0.15s;
    animation: fadeUp 0.3s ease;
  }
  .task-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .task-card-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
  .task-title { font-size: 14px; font-weight: 500; flex: 1; line-height: 1.4; }
  .urgency-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
}
  .urgency-urgente { background: rgba(244,63,94,0.15); color: var(--urgente); }
  .urgency-medio { background: rgba(245,158,11,0.15); color: var(--medio); }
  .urgency-nao_urgente { background: rgba(34,197,94,0.15); color: var(--nao-urgente); }
  .task-demand { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; padding: 3px 8px; border-radius: 6px; margin-bottom: 8px; }
  .task-footer { display: flex; align-items: center; gap: 8px; }
  .task-footer .spacer { flex: 1; }
  .task-assignee { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: #fff; }
  .task-due { font-size: 11px; color: var(--muted); }
  .task-due.overdue { color: var(--urgente); }

  /* ADD COLUMN */
  .add-column-btn {
    min-width: 260px; height: 56px; border: 2px dashed var(--border); border-radius: var(--radius);
    background: transparent; color: var(--muted); font-size: 14px; cursor: pointer; font-family: inherit;
    transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .add-column-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.2s ease; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; width: 500px; max-width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 40px 80px rgba(0,0,0,0.7); animation: slideUp 0.3s ease; }
  .modal-header { padding: 24px 24px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 20px; }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; padding: 4px; border-radius: 6px; transition: color 0.2s; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

  .select-field { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 12px 14px; border-radius: 10px; font-size: 14px; font-family: inherit; outline: none; transition: border 0.2s; cursor: pointer; }
  .select-field:focus { border-color: var(--accent); }
  textarea.form-control { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 12px 14px; border-radius: 10px; font-size: 14px; font-family: inherit; outline: none; resize: vertical; min-height: 80px; transition: border 0.2s; }
  textarea.form-control:focus { border-color: var(--accent); }

  .urgency-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .urgency-opt { padding: 10px; border: 2px solid var(--border); border-radius: 10px; cursor: pointer; text-align: center; font-size: 13px; font-weight: 500; transition: all 0.2s; }
  .urgency-opt[data-v="urgente"].selected { border-color: var(--urgente); background: rgba(244,63,94,0.1); color: var(--urgente); }
  .urgency-opt[data-v="medio"].selected { border-color: var(--medio); background: rgba(245,158,11,0.1); color: var(--medio); }
  .urgency-opt[data-v="nao_urgente"].selected { border-color: var(--nao-urgente); background: rgba(34,197,94,0.1); color: var(--nao-urgente); }

  .task-card.urgente {
  border-left: 4px solid var(--urgente);
}

.task-card.medio {
  border-left: 4px solid var(--medio);
}

.task-card.nao_urgente {
  border-left: 4px solid var(--nao-urgente);
}

  .task-card.urgente:hover {
  border-color: var(--urgente);
}

.task-card.medio:hover {
  border-color: var(--medio);
}

.task-card.nao_urgente:hover {
  border-color: var(--nao-urgente);
}
  
.task-card.overdue {
  border: 1px solid var(--urgente);
  background: rgba(244,63,94,0.08);
}

.task-due.overdue {
  color: var(--urgente);
  font-weight: 600;
}

  <div id="edit-task-modal" class="modal-overlay hidden" onclick="closeModalOverlay(event,'edit-task-modal')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Editar Tarefa</div>
      <button class="modal-close" onclick="closeModal('edit-task-modal')">×</button>
    </div>

    <div class="modal-body">

      <input type="hidden" id="et-id"/>

      <div class="form-group">
        <label>Título</label>
        <input type="text" id="et-title" />
      </div>

      <div class="form-group">
        <label>Descrição</label>
        <textarea id="et-desc" class="form-control"></textarea>
      </div>

      <div class="form-group">
        <label>Coluna</label>
        <select id="et-column" class="select-field"></select>
      </div>

      <div class="form-group">
        <label>Urgência</label>
        <select id="et-urgency" class="select-field">
          <option value="urgente">🔴 Urgente</option>
          <option value="medio">🟡 Médio</option>
          <option value="nao_urgente">🟢 Não Urgente</option>
        </select>
      </div>

      <div class="form-group">
        <label>Prazo</label>
        <input type="date" id="et-due"/>
      </div>

    </div>

    <div class="modal-footer">
      <button class="btn-sm" onclick="closeModal('edit-task-modal')">Cancelar</button>
      <button class="btn-sm primary" onclick="updateTask()">Salvar</button>
    </div>
  </div>
</div>
  
  /* NOTIFICATIONS */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 20px; font-size: 14px; z-index: 999; animation: slideIn 0.3s ease; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
  .toast.success { border-left: 4px solid var(--nao-urgente); }
  .toast.error { border-left: 4px solid var(--urgente); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

  .hidden { display: none !important; }

  /* Scrollbar global */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.footer-simple {
  text-align: center;
  padding: 10px;
  background: #ececec;
  color: #000000;
  margin-top: 20px;
  font-size: 14px;
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <img src="funase.png" alt="logo" style="width:150px;margin:0 auto 30px;display:block"/>
    <p class="auth-sub">Agenda Corregedoria</p>  

    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">Entrar</div>
      <div class="auth-tab" onclick="switchTab('register')">Cadastrar</div>
    </div>
    <div id="login-form">
      <div class="form-group"><label>Usuário</label><input type="text" id="login-email" placeholder="seu usuário"/></div>
      <div class="form-group"><label>Senha</label><input type="password" id="login-pass" placeholder="••••••••"/></div>
      <button class="btn-primary" onclick="doLogin()">Entrar</button>
      <div class="error-msg hidden" id="login-err"></div>
    </div>
    <div id="register-form" class="hidden">
      <div class="form-group"><label>Nome</label><input type="text" id="reg-name" placeholder="Seu nome"/></div>
      <div class="form-group"><label>Usuário</label><input type="text" id="reg-email" placeholder="seu usuário"/></div>
      <div class="form-group"><label>Senha</label><input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres"/></div>
      <button class="btn-primary" onclick="doRegister()">Criar conta</button>
      <div class="error-msg hidden" id="reg-err"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-logo" onclick="goHome()">TaskFlow</div>
    <div class="topbar-right">
      <div id="user-avatar-top" class="user-avatar"></div>
      <span id="user-name-top" style="font-size:14px; color:var(--muted)"></span>
      <button class="btn-sm" onclick="doLogout()">Sair</button>
    </div>
  </div>

  <!-- HOME -->
  <div id="home-view">
    <div class="home-header">
      <h1 id="home-greeting">Olá! 👋</h1>
      <p>Seus quadros de trabalho</p>
    </div>
    <div class="boards-grid" id="boards-grid">
      <div class="new-board-card" onclick="openNewBoardModal()">
        <span style="font-size:22px">＋</span>
        <span>Novo Quadro</span>
      </div>
    </div>
  </div>

  <!-- BOARD VIEW -->
  <div id="board-view">
    <div class="board-header">
      <button class="btn-sm" onclick="goHome()">← Quadros</button>
      <div class="board-title" id="current-board-title"></div>
      <div class="spacer"></div>
      <button class="btn-sm primary" onclick="openNewTaskModal()">+ Tarefa</button>
    </div>
    <div class="kanban-area" id="kanban-area"></div>
  </div>
</div>

<!-- MODAL: Novo Board -->
<div id="new-board-modal" class="modal-overlay hidden" onclick="closeModalOverlay(event,'new-board-modal')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Novo Quadro</div>
      <button class="modal-close" onclick="closeModal('new-board-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label>Título</label><input type="text" id="nb-title" placeholder="Ex: Projeto Alpha" class="form-group input" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:10px;font-size:14px;font-family:inherit;outline:none;"/></div>
      <div class="form-group"><label>Descrição (opcional)</label><textarea class="form-control" id="nb-desc" placeholder="Descreva o objetivo do quadro..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn-sm" onclick="closeModal('new-board-modal')">Cancelar</button>
      <button class="btn-sm primary" onclick="createBoard()">Criar Quadro</button>
    </div>
  </div>
</div>

<!-- MODAL: Nova Tarefa -->
<div id="new-task-modal" class="modal-overlay hidden" onclick="closeModalOverlay(event,'new-task-modal')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Nova Tarefa</div>
      <button class="modal-close" onclick="closeModal('new-task-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label>Título *</label><input type="text" id="nt-title" placeholder="Descreva a tarefa..." style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:10px;font-size:14px;font-family:inherit;outline:none;"/></div>
      <div class="form-group"><label>Descrição</label><textarea class="form-control" id="nt-desc" placeholder="Detalhes adicionais..."></textarea></div>
      <div class="form-group">
        <label>Coluna</label>
        <select class="select-field" id="nt-column"></select>
      </div>
      <div class="form-group">
        <label>Tipo de Demanda</label>
        <select class="select-field" id="nt-demand-type">
          <option value="">Selecione um tipo...</option>
        </select>
      </div>
      <div class="form-group">
        <label>Urgência</label>
        <div class="urgency-grid">
          <div class="urgency-opt" data-v="urgente" onclick="selectUrgency('urgente')">🔴 Urgente</div>
          <div class="urgency-opt selected" data-v="medio" onclick="selectUrgency('medio')">🟡 Médio</div>
          <div class="urgency-opt" data-v="nao_urgente" onclick="selectUrgency('nao_urgente')">🟢 Não Urgente</div>
        </div>
      </div>
      <div class="form-group">
        <label>Responsável</label>
        <select class="select-field" id="nt-assignee">
          <option value="">Sem responsável</option>
        </select>
      </div>
      <div class="form-group"><label>Prazo</label><input type="date" id="nt-due" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:10px;font-size:14px;font-family:inherit;outline:none;"/></div>
    </div>
    <div class="modal-footer">
      <button class="btn-sm" onclick="closeModal('new-task-modal')">Cancelar</button>
      <button class="btn-sm primary" onclick="createTask()">Criar Tarefa</button>
    </div>
  </div>
</div>

<!-- MODAL: Nova Coluna -->
<div id="new-col-modal" class="modal-overlay hidden" onclick="closeModalOverlay(event,'new-col-modal')">
  <div class="modal" style="max-width:380px">
    <div class="modal-header">
      <div class="modal-title">Nova Coluna</div>
      <button class="modal-close" onclick="closeModal('new-col-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label>Nome da coluna</label><input type="text" id="nc-title" placeholder="Ex: Em Revisão" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:10px;font-size:14px;font-family:inherit;outline:none;"/></div>
    </div>
    <div class="modal-footer">
      <button class="btn-sm" onclick="closeModal('new-col-modal')">Cancelar</button>
      <button class="btn-sm primary" onclick="createColumn()">Criar</button>
    </div>
  </div>
</div>
<!-- MODAL: Editar Tarefa -->
<div id="edit-task-modal" class="modal-overlay hidden" onclick="closeModalOverlay(event,'edit-task-modal')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Editar Tarefa</div>
      <button class="modal-close" onclick="closeModal('edit-task-modal')">×</button>
    </div>

    <div class="modal-body">

      <input type="hidden" id="et-id"/>

      <div class="form-group">
        <label>Título</label>
        <input type="text" id="et-title" />
      </div>

      <div class="form-group">
        <label>Descrição</label>
        <textarea id="et-desc" class="form-control"></textarea>
      </div>

      <div class="form-group">
        <label>Coluna</label>
        <select id="et-column" class="select-field"></select>
      </div>

      <div class="form-group">
        <label>Urgência</label>
        <select id="et-urgency" class="select-field">
          <option value="urgente">🔴 Urgente</option>
          <option value="medio">🟡 Médio</option>
          <option value="nao_urgente">🟢 Não Urgente</option>
        </select>
      </div>

      <div class="form-group">
        <label>Prazo</label>
        <input type="date" id="et-due"/>
      </div>

    </div>

    <div class="modal-footer">
      <button class="btn-sm" onclick="closeModal('edit-task-modal')">Cancelar</button>
      <button class="btn-sm primary" onclick="updateTask()">Salvar</button>
    </div>
  </div>
</div>
  
<script>
const API = "https://corregedoriaback.onrender.com/api";

let token = localStorage.getItem('tf_token');
let currentUser = JSON.parse(localStorage.getItem('tf_user') || 'null');
let currentBoard = null;
let selectedColumnId = null;
let selectedUrgency = 'medio';

/* ================= API ================= */
async function apiFetch(path, opts = {}) {
  const headers = {
    'Content-Type': 'application/json',
    ...(token ? { Authorization: `Bearer ${token}` } : {})
  };

  const r = await fetch(API + path, { headers, ...opts });
  const data = await r.json();

  if (!r.ok) throw new Error(data.detail || 'Erro');
  return data;
}

/* ================= AUTH ================= */
async function doLogin() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-pass').value;

  try {
    const data = await apiFetch('/auth/login', {
      method: 'POST',
      body: JSON.stringify({ email, password })
    });

    setSession(data);
  } catch (e) {
    alert(e.message);
  }
}

async function doRegister() {
  const name = document.getElementById('reg-name').value;
  const email = document.getElementById('reg-email').value;
  const password = document.getElementById('reg-pass').value;

  try {
    const data = await apiFetch('/auth/register', {
      method: 'POST',
      body: JSON.stringify({ name, email, password })
    });

    setSession(data);
  } catch (e) {
    alert(e.message);
  }
}

  async function openEditTask(taskId) {
  const task = await apiFetch(`/tasks/${taskId}`);

  document.getElementById('et-id').value = task.id;
  document.getElementById('et-title').value = task.title || '';
  document.getElementById('et-desc').value = task.description || '';
  document.getElementById('et-urgency').value = task.urgency || 'medio';
  document.getElementById('et-due').value = task.due_date || '';

  // carregar colunas
  const columns = await apiFetch(`/columns/board/${currentBoard.id}`);
  const select = document.getElementById('et-column');
  select.innerHTML = '';

  columns.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.title;
    if (c.id === task.column_id) opt.selected = true;
    select.appendChild(opt);
  });

  openModal('edit-task-modal');
}

  async function updateTask() {
  const id = document.getElementById('et-id').value;

  try {
    await apiFetch(`/tasks/${id}`, {
      method: 'PUT',
      body: JSON.stringify({
        title: document.getElementById('et-title').value,
        description: document.getElementById('et-desc').value,
        urgency: document.getElementById('et-urgency').value,
        due_date: document.getElementById('et-due').value,
        column_id: document.getElementById('et-column').value
      })
    });

    closeModal('edit-task-modal');
    showToast('Tarefa atualizada');

    loadBoard(currentBoard.id);

  } catch (e) {
    showToast(e.message, 'error');
  }
}
  
function setSession(data) {
  token = data.access_token;
  currentUser = data.user;

  localStorage.setItem('tf_token', token);
  localStorage.setItem('tf_user', JSON.stringify(currentUser));

  showApp();
}

function doLogout() {
  localStorage.clear();
  location.reload();
}

/* ================= INIT ================= */
function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'flex';

  document.getElementById('user-name-top').textContent = currentUser.name;

  const av = document.getElementById('user-avatar-top');
  av.textContent = currentUser.name[0];
  av.style.background = currentUser.avatar_color;

  loadBoards();
}

if (token && currentUser) showApp();

/* ================= BOARDS ================= */
async function loadBoards() {
  const boards = await apiFetch('/boards');

  const grid = document.getElementById('boards-grid');
  grid.innerHTML = '';

  boards.forEach(b => {
    const div = document.createElement('div');
    div.className = 'board-card';
    div.innerHTML = `<h3>${b.title}</h3><p>${b.description || ''}</p>`;
    div.onclick = () => openBoard(b);
    grid.appendChild(div);
  });
}

async function createBoard() {
  const title = document.getElementById('nb-title').value;
  const description = document.getElementById('nb-desc').value;

  await apiFetch('/boards', {
    method: 'POST',
    body: JSON.stringify({ title, description })
  });

  closeModal('new-board-modal');
  loadBoards();
}

/* ================= BOARD ================= */
function openBoard(board) {
  currentBoard = board;

  document.getElementById('home-view').style.display = 'none';
  document.getElementById('board-view').style.display = 'flex';
  document.getElementById('current-board-title').textContent = board.title;

  loadColumns(board.id);
}

/* ================= COLUMNS ================= */
async function loadColumns(boardId) {
  const cols = await apiFetch(`/columns/board/${boardId}`);

  const area = document.getElementById('kanban-area');
  area.innerHTML = '';

  cols.forEach(col => {
    const div = document.createElement('div');
    div.className = 'column';

    div.innerHTML = `
      <div class="col-header">
        <div class="col-title">${col.title}</div>
      </div>
      <div class="col-tasks" id="col-${col.id}"></div>
      <div class="col-footer">
        <button class="add-task-btn" onclick="openNewTaskModal(${col.id})">+ Tarefa</button>
      </div>
    `;

    area.appendChild(div);
    loadTasks(col.id);
  });

  // botão adicionar coluna
  const addBtn = document.createElement('button');
  addBtn.className = 'add-column-btn';
  addBtn.innerText = '+ Nova coluna';
  addBtn.onclick = () => openModal('new-col-modal');

  area.appendChild(addBtn);
}

async function createColumn() {
  const title = document.getElementById('nc-title').value;

  await apiFetch('/columns', {
    method: 'POST',
    body: JSON.stringify({
      title,
      board_id: currentBoard.id
    })
  });

  closeModal('new-col-modal');
  loadColumns(currentBoard.id);
}

/* ================= TASKS ================= */
async function loadTasks(columnId) {
  const tasks = await apiFetch(`/tasks/column/${columnId}`);

  const container = document.getElementById(`col-${columnId}`);
  container.innerHTML = '';

 tasks.forEach(t => {
  const div = document.createElement('div');

  const urgencyClass = t.urgency;

  let isOverdue = false;

  if (t.due_date) {
    const today = new Date();
    const due = new Date(t.due_date);

    today.setHours(0,0,0,0);
    due.setHours(0,0,0,0);

    if (due < today) {
      isOverdue = true;
    }
  }

  div.className = `task-card ${urgencyClass} ${isOverdue ? 'overdue' : ''}`;

  // 👇 AQUI
  div.onclick = () => openEditTask(t.id);

  div.innerHTML = `
    <div class="task-card-top">
      <div class="task-title">${t.title}</div>

      <div class="urgency-badge urgency-${urgencyClass}">
        ${urgencyClass}
      </div>
    </div>

    ${
      t.due_date
        ? `<div class="task-due ${isOverdue ? 'overdue' : ''}">
            📅 ${t.due_date}
          </div>`
        : ''
    }
  `;

  container.appendChild(div);
});

function openNewTaskModal(columnId) {
  selectedColumnId = columnId;
  openModal('new-task-modal');
}

async function createTask() {
  const title = document.getElementById('nt-title').value;
  const description = document.getElementById('nt-desc').value;
  const due_date = document.getElementById('nt-due').value;

  await apiFetch('/tasks', {
    method: 'POST',
    body: JSON.stringify({
      title,
      description,
      column_id: selectedColumnId,
      board_id: currentBoard.id,
      urgency: selectedUrgency,
      due_date
    })
  });

  closeModal('new-task-modal');
  loadColumns(currentBoard.id);
}

/* ================= UI ================= */
function openModal(id) {
  document.getElementById(id).classList.remove('hidden');
}

function closeModal(id) {
  document.getElementById(id).classList.add('hidden');
}

function selectUrgency(val) {
  selectedUrgency = val;

  document.querySelectorAll('.urgency-opt').forEach(el =>
    el.classList.remove('selected')
  );

  document.querySelector(`[data-v="${val}"]`).classList.add('selected');
}
</script>
<footer class="footer-simple">
  <p>© 2026 | PrismCode. Todos os direitos reservados.</p>
  <img src="prism.png" alt="logo da empresa" style="width:100px;margin-top:10px"/>
</footer>
</body>
</html>
